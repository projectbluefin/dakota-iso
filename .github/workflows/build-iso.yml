name: Build and Publish Dakota Live ISO

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:
    inputs:
      skip_upload:
        description: 'Build ISO but skip uploading to R2 (dry run)'
        required: false
        default: false
        type: boolean

jobs:
  build-and-publish:
    name: Build Dakota Live ISO (NVIDIA + offline store)
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y podman buildah skopeo \
            mtools xorriso squashfs-tools dosfstools isomd5sum

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin

      # Pull nvidia payload image — the only image needed in the offline store.
      # Non-nvidia users install from this store; their installed system tracks
      # dakota:stable and rebases on first bootc upgrade automatically.
      - name: Pull offline payload images
        run: |
          sudo podman pull ghcr.io/projectbluefin/dakota-nvidia:stable

      # Build only the NVIDIA live container — it's the one that boots live.
      # Non-NVIDIA is available for install via the offline store.
      - name: Build live container — dakota-nvidia
        run: |
          sudo podman build \
            --cap-add sys_admin --security-opt label=disable \
            --layers \
            --build-arg TARGET=dakota-nvidia \
            --build-arg INSTALLER_CHANNEL=stable \
            -t localhost/dakota-nvidia-live:latest \
            ./live

      # Verify mkfs.xfs executes successfully inside the live container.
      # Catches missing shared library deps (libinih, liburcu, etc.) before
      # the squashfs is assembled — a runtime failure here costs seconds,
      # not a full ISO build + user install attempt.
      - name: Smoke test — mkfs.xfs runs inside live container
        run: |
          sudo podman run --rm localhost/dakota-nvidia-live:latest \
            mkfs.xfs -V

      - name: Disk space before squashfs build
        run: df -h /

      - name: Build live squashfs + boot tar
        env:
          SUPERISO_COMPRESSION: release
          SUPERISO_TMPDIR: /var/iso-build
        run: |
          sudo mkdir -p /var/iso-build
          sudo -E bash scripts/build-live-squashfs.sh \
            --oci-image ghcr.io/projectbluefin/dakota-nvidia:stable \
            localhost/dakota-nvidia-live:latest \
            /var/iso-build/dakota-nvidia.rootfs.sfs \
            /var/iso-build/dakota-nvidia-boot.tar

      - name: Verify offline OCI store is embedded
        run: |
          # Verify /var/lib/containers/storage contains VFS layer data.
          # VFS storage uses content-addressed hash paths — image names like
          # "ghcr.io/..." never appear in file paths.  Check for vfs-images/
          # which containers/storage creates for every imported image.
          COUNT=$(sudo unsquashfs -lc /var/iso-build/dakota-nvidia.rootfs.sfs \
            var/lib/containers/storage/vfs-images 2>/dev/null | \
            grep -c "squashfs-root" || true)
          if [[ "${COUNT}" -eq 0 ]]; then
            echo "ERROR: VFS containers-storage missing vfs-images — OCI embedding failed" >&2
            echo "The ISO would ship without an offline install store (see issue #78)" >&2
            exit 1
          fi
          echo ">>> OCI store assertion passed (vfs-images has ${COUNT} entries)"

      - name: Disk space before ISO assembly
        run: df -h /

      - name: Assemble ISO
        run: |
          sudo bash live/src/build-iso.sh \
            /var/iso-build/dakota-nvidia-boot.tar \
            /var/iso-build/dakota-nvidia.rootfs.sfs \
            /var/iso-build/dakota-live.iso
          mkdir -p output
          sudo cp /var/iso-build/dakota-live.iso output/
          sudo chown -R "$USER:$(id -gn)" output/

      - name: Compute ISO name
        id: iso
        run: |
          DATE=$(date -u +%Y%m%d)
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "dated=dakota-live-${DATE}-${SHA}.iso" >> "$GITHUB_OUTPUT"
          echo "path=output/dakota-live.iso" >> "$GITHUB_OUTPUT"

      - name: Generate SHA256 checksum
        id: checksum
        run: |
          ISO="${{ steps.iso.outputs.path }}"
          DATED="${{ steps.iso.outputs.dated }}"
          CHECKSUM_PATH="output/${DATED}-CHECKSUM"
          LATEST_CHECKSUM_PATH="output/dakota-live-latest.iso-CHECKSUM"
          sha256sum "$ISO" | sed "s|${ISO}|${DATED}|" | tee "$CHECKSUM_PATH"
          sha256sum "$ISO" | sed "s|${ISO}|dakota-live-latest.iso|" > "$LATEST_CHECKSUM_PATH"
          echo "path=${CHECKSUM_PATH}" >> "$GITHUB_OUTPUT"
          echo "latest_path=${LATEST_CHECKSUM_PATH}" >> "$GITHUB_OUTPUT"

      # Patch production squashfs to enable sshd for E2E SSH access.
      # The production ISO has sshd disabled; for the E2E test we need SSH.
      # Unsquashfs → enable sshd → re-squashfs (zstd-1 for speed) → debug ISO.
      # Production ISO is NOT modified and is still the one uploaded to R2.
      - name: Build debug ISO for E2E test (production rootfs + sshd enabled)
        run: |
          echo ">>> Unsquashing production rootfs..."
          sudo unsquashfs -d /var/iso-build/debug-rootfs \
            /var/iso-build/dakota-nvidia.rootfs.sfs

          # Enable sshd.service
          sudo mkdir -p \
            /var/iso-build/debug-rootfs/etc/systemd/system/multi-user.target.wants
          sudo ln -sf /usr/lib/systemd/system/sshd.service \
            /var/iso-build/debug-rootfs/etc/systemd/system/multi-user.target.wants/sshd.service

          # Allow password auth (liveuser / live)
          sudo bash -c 'printf "\nPermitRootLogin yes\nPasswordAuthentication yes\nPermitEmptyPasswords yes\n" \
            >> /var/iso-build/debug-rootfs/etc/ssh/sshd_config'

          # Set liveuser password to 'live'
          HASH=$(openssl passwd -6 'live')
          if sudo grep -q '^liveuser:' /var/iso-build/debug-rootfs/etc/shadow 2>/dev/null; then
            sudo sed -i "s|^liveuser:[^:]*:|liveuser:${HASH}:|" \
              /var/iso-build/debug-rootfs/etc/shadow
          fi

          # Re-squashfs with fast compression (debug-only, not production)
          echo ">>> Re-squashing debug rootfs (zstd-1)..."
          # dracut's usable_root() requires proc/, sys/, and dev/ as empty dirs at
          # the squashfs root. With -wildcards, "-e sys" removes the dir entry
          # entirely on both mksquashfs 4.6.x and 4.7+; use "-e sys/*" to exclude
          # only contents while preserving the empty directory node.
          sudo mkdir -p /var/iso-build/debug-rootfs/proc \
                        /var/iso-build/debug-rootfs/sys \
                        /var/iso-build/debug-rootfs/dev
          sudo mksquashfs /var/iso-build/debug-rootfs \
            /var/iso-build/dakota-debug.rootfs.sfs \
            -noappend -comp zstd -Xcompression-level 1 -b 1M -processors 4 \
            -wildcards \
            -e "proc/*" -e "sys/*" -e "dev/*" -e run -e tmp
          sudo rm -rf /var/iso-build/debug-rootfs

          # Assemble debug ISO (reuse boot tar from production build)
          echo ">>> Assembling debug ISO..."
          sudo bash live/src/build-iso.sh \
            /var/iso-build/dakota-nvidia-boot.tar \
            /var/iso-build/dakota-debug.rootfs.sfs \
            output/dakota-debug-live.iso
          echo "Debug ISO: $(du -sh output/dakota-debug-live.iso | cut -f1)"

      - name: Install QEMU deps for E2E test
        run: sudo apt-get install -y qemu-system-x86 ovmf sshpass socat -qq

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm
          sudo adduser "$USER" kvm || true

      - name: Install just
        uses: taiki-e/install-action@e49978b799e49ff429d162b7a30601a569ab6538 # v2.81.1 (just)
        with:
          tool: just

      # ── E2E Gate 1: ENOSPC regression guard (4 GiB RAM, tight overlay tmpfs) ──
      # Runs at 4096 MiB so the dracut overlayfs is ~2 GiB — tight enough to
      # reproduce ENOSPC-class bugs in the installer's blob staging path.
      # Gate passes as soon as skopeo copies the blob — the slow bootc install
      # is intentionally skipped here; it runs at 8 GiB in the next step.
      - name: "E2E 1/4 — Boot live ISO (4 GiB)"
        id: e2e_boot_live
        timeout-minutes: 10
        run: sudo env PATH="$PATH" just qemu-mem=4096 plain-boot-qemu-live dakota

      - name: "E2E 2/4 — ENOSPC gate: OCI export only (4 GiB)"
        id: e2e_enospc
        timeout-minutes: 10
        run: sudo env PATH="$PATH" just plain-enospc-gate dakota

      # Kill the live VM before starting the full install at 8 GiB
      - name: Reset QEMU for full install (8 GiB)
        if: always() && steps.e2e_enospc.conclusion == 'success'
        run: |
          echo q | sudo socat - UNIX-CONNECT:/tmp/dakota-plain-qemu-live.sock 2>/dev/null || true
          sudo rm -f /var/tmp/dakota-plain-install.img
          truncate -s 64G /var/tmp/dakota-plain-install.img

      # ── E2E Gate 2: Full functional install + boot verification (8 GiB) ───────
      # Boot the live ISO fresh at 8 GiB so btrfs+overlay is not I/O-starved,
      # run the complete fisherman install, boot the result, and verify.
      #
      # continue-on-error: true kept as safety net; the fisherman hostname-write
      # composefs bug (ostree admin --print-current-dir against live sysroot after
      # target unmount) is patched locally via scripts/fisherman-install.sh which
      # detects the hostname-only failure, re-mounts the btrfs root, and writes
      # /etc/hostname directly into the deployment directory.
      # Upstream bug: https://github.com/tuna-os/fisherman/issues
      # ISO upload is gated on all three E2E checks: ENOSPC export, full install,
      # and installed-boot verification. A final "E2E status" step below still
      # re-fails the job if the install truly fails.
      - name: "E2E 3/4 — Full install composefs (8 GiB)"
        id: e2e_install
        timeout-minutes: 60
        continue-on-error: true
        run: |
          sudo env PATH="$PATH" just qemu-mem=8192 plain-boot-qemu-live dakota
          sudo env PATH="$PATH" just plain-install-qemu dakota

      - name: "E2E 4/4 — Boot installed + verify Graphical target (8 GiB)"
        id: e2e_verify
        timeout-minutes: 20
        if: steps.e2e_install.outcome == 'success'
        run: |
          sudo env PATH="$PATH" just qemu-mem=8192 plain-boot-qemu-installed dakota
          sudo env PATH="$PATH" just plain-verify-qemu dakota

      - name: Upload plain E2E serial logs
        if: always()
        run: sudo chmod a+r /tmp/dakota-plain-qemu-*.log /tmp/plain-screenshot-final.png 2>/dev/null || true
      - name: Upload plain E2E serial logs artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: plain-e2e-serial-logs
          path: |
            /tmp/dakota-plain-qemu-live-serial.log
            /tmp/dakota-plain-qemu-installed-serial.log
            /tmp/plain-screenshot-final.png
          if-no-files-found: warn
          retention-days: 14

      - name: Upload plain E2E disk (on failure, for post-mortem)
        if: always() && (steps.e2e_install.outcome == 'failure' || steps.e2e_verify.outcome == 'failure')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: plain-e2e-disk
          path: /var/tmp/dakota-plain-install.img
          if-no-files-found: warn
          retention-days: 3

      - name: Boot verification (UEFI + serial)
        id: boot_verify
        continue-on-error: true
        timeout-minutes: 10
        run: |
          sudo apt-get install -y qemu-system-x86 ovmf socat imagemagick -qq

          ISO="${{ steps.iso.outputs.path }}"
          EFI_CODE=""; EFI_VARS=""
          for f in /usr/share/OVMF/OVMF_CODE_4M.fd /usr/share/OVMF/OVMF_CODE.fd; do
            [ -f "$f" ] && EFI_CODE="$f" && break
          done
          for f in /usr/share/OVMF/OVMF_VARS_4M.fd /usr/share/OVMF/OVMF_VARS.fd; do
            if [ -f "$f" ]; then cp "$f" /tmp/EFI_VARS.fd; EFI_VARS="/tmp/EFI_VARS.fd"; break; fi
          done

          PFLASH=()
          if [ -n "$EFI_CODE" ] && [ -n "$EFI_VARS" ]; then
            PFLASH+=(-drive "if=pflash,format=raw,readonly=on,file=$EFI_CODE")
            PFLASH+=(-drive "if=pflash,format=raw,file=$EFI_VARS")
          fi

          sudo qemu-system-x86_64 \
            -machine type=q35,accel=kvm \
            -cpu host -m 4G -smp 2 \
            "${PFLASH[@]}" \
            -cdrom "$ISO" -boot d \
            -monitor unix:/tmp/qemu-monitor.sock,server,nowait \
            -serial file:/tmp/serial.log \
            -display none -daemonize

          for i in $(seq 1 30); do [ -S /tmp/qemu-monitor.sock ] && break; sleep 2; done

          echo "==> Waiting up to 5 minutes for DAKOTA_LIVE_READY..."
          for i in $(seq 1 60); do
            sudo grep -q "DAKOTA_LIVE_READY" /tmp/serial.log 2>/dev/null && \
              { echo "==> Ready after $((i*5))s"; break; }
            [ "$i" -eq 60 ] && echo "WARNING: timed out" || true
            sleep 5
          done

          echo "screendump /tmp/screenshot.ppm" | \
            sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock || true
          sleep 2
          sudo test -f /tmp/screenshot.ppm && \
            sudo convert /tmp/screenshot.ppm screenshot.png 2>/dev/null || true
          echo "quit" | sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock || true

          sudo grep -qE "DAKOTA_LIVE_READY|Finished live-ready\.service" /tmp/serial.log || \
            { echo "ERROR: live environment did not reach ready state"
              sudo tail -50 /tmp/serial.log; exit 1; }

      - name: Upload ISO to Cloudflare R2
        if: ${{ inputs.skip_upload != true && github.event_name != 'pull_request' && steps.e2e_enospc.conclusion == 'success' && steps.e2e_install.outcome == 'success' && steps.e2e_verify.outcome == 'success' && steps.boot_verify.outcome == 'success' }}
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.RCLONE_CONFIG_R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.RCLONE_CONFIG_R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.RCLONE_CONFIG_R2_ENDPOINT }}
        run: |
          sudo apt-get install -y rclone -qq
          ISO="${{ steps.iso.outputs.path }}"
          DATED="${{ steps.iso.outputs.dated }}"
          rclone copyto --log-level INFO --s3-no-check-bucket \
            "$ISO" "R2:testing/${DATED}"
          rclone copyto --log-level INFO --s3-no-check-bucket \
            "$ISO" "R2:testing/dakota-live-latest.iso"
          rclone copyto --log-level INFO --s3-no-check-bucket \
            "${{ steps.checksum.outputs.path }}" "R2:testing/${DATED}-CHECKSUM"
          rclone copyto --log-level INFO --s3-no-check-bucket \
            "${{ steps.checksum.outputs.latest_path }}" \
            "R2:testing/dakota-live-latest.iso-CHECKSUM"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.iso.outputs.dated }}
          path: ${{ steps.iso.outputs.path }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload checksum artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: steps.checksum.outputs.path != ''
        with:
          name: checksum-${{ steps.iso.outputs.dated }}
          path: ${{ steps.checksum.outputs.path }}
          if-no-files-found: warn
          retention-days: 7

      - name: Upload boot screenshot
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: boot-screenshot
          path: screenshot.png
          if-no-files-found: warn

      # Re-fail the job if E2E full install failed (continue-on-error above keeps
      # diagnostics and artifacts flowing; this step restores the visible red CI status).
      # Note: the fisherman hostname-write composefs bug is patched in
      # scripts/fisherman-install.sh; this step should not trigger for hostname
      # failures anymore.  If it fires, it is a real install failure.
      - name: E2E full-install status
        if: always() && (steps.e2e_install.outcome == 'failure' || steps.boot_verify.outcome == 'failure')
        run: |
          if [ "${{ steps.e2e_install.outcome }}" = "failure" ]; then
            echo "::error::E2E 3/4 (full composefs install) failed — see step logs above"
            echo "If this is the fisherman hostname-write composefs bug, check scripts/fisherman-install.sh"
          fi
          if [ "${{ steps.boot_verify.outcome }}" = "failure" ]; then
            echo "::error::Production ISO failed the UEFI smoke boot — upload was skipped"
          fi
          exit 1
