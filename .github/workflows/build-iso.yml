name: Build and Publish Dakota Live ISO

on:
  push:
    branches: [main]
    paths:
      - 'live/**'
      - 'scripts/**'
      - '.github/workflows/build-iso.yml'
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      skip_upload:
        description: 'Build ISO but skip uploading to R2 (dry run)'
        required: false
        default: false
        type: boolean

jobs:
  build-and-publish:
    name: Build Dakota Live ISO (NVIDIA + offline store)
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y podman buildah skopeo \
            mtools xorriso squashfs-tools dosfstools isomd5sum

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin

      # Pull nvidia payload image — the only image needed in the offline store.
      # Non-nvidia users install from this store; their installed system tracks
      # dakota:stable and rebases on first bootc upgrade automatically.
      - name: Pull offline payload images
        run: |
          sudo podman pull ghcr.io/projectbluefin/dakota-nvidia:stable

      # Build only the NVIDIA live container — it's the one that boots live.
      # Non-NVIDIA is available for install via the offline store.
      - name: Build live container — dakota-nvidia
        run: |
          sudo podman build \
            --cap-add sys_admin --security-opt label=disable \
            --layers \
            --build-arg TARGET=dakota-nvidia \
            --build-arg INSTALLER_CHANNEL=stable \
            -t localhost/dakota-nvidia-live:latest \
            ./live

      - name: Disk space before squashfs build
        run: df -h /

      - name: Build live squashfs + boot tar
        env:
          SUPERISO_COMPRESSION: release
        run: |
          sudo mkdir -p /var/iso-build
          sudo -E bash scripts/build-live-squashfs.sh \
            --oci-image ghcr.io/projectbluefin/dakota-nvidia:stable \
            localhost/dakota-nvidia-live:latest \
            /var/iso-build/dakota-nvidia.rootfs.sfs \
            /var/iso-build/dakota-nvidia-boot.tar

      - name: Verify offline OCI store is embedded
        run: |
          # Verify /var/lib/containers/storage contains VFS layer data.
          # VFS storage uses content-addressed hash paths — image names like
          # "ghcr.io/..." never appear in file paths.  Check for vfs-images/
          # which containers/storage creates for every imported image.
          COUNT=$(sudo unsquashfs -lc /var/iso-build/dakota-nvidia.rootfs.sfs \
            var/lib/containers/storage/vfs-images 2>/dev/null | \
            grep -c "squashfs-root" || true)
          if [[ "${COUNT}" -eq 0 ]]; then
            echo "ERROR: VFS containers-storage missing vfs-images — OCI embedding failed" >&2
            echo "The ISO would ship without an offline install store (see issue #78)" >&2
            exit 1
          fi
          echo ">>> OCI store assertion passed (vfs-images has ${COUNT} entries)"

      - name: Disk space before ISO assembly
        run: df -h /

      - name: Assemble ISO
        run: |
          sudo bash live/src/build-iso.sh \
            /var/iso-build/dakota-nvidia-boot.tar \
            /var/iso-build/dakota-nvidia.rootfs.sfs \
            /var/iso-build/dakota-live.iso
          mkdir -p output
          sudo cp /var/iso-build/dakota-live.iso output/
          sudo chown -R "$USER:$(id -gn)" output/

      - name: Compute ISO name
        id: iso
        run: |
          DATE=$(date -u +%Y%m%d)
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "dated=dakota-live-${DATE}-${SHA}.iso" >> "$GITHUB_OUTPUT"
          echo "path=output/dakota-live.iso" >> "$GITHUB_OUTPUT"

      - name: Generate SHA256 checksum
        id: checksum
        run: |
          ISO="${{ steps.iso.outputs.path }}"
          DATED="${{ steps.iso.outputs.dated }}"
          CHECKSUM_PATH="output/${DATED}-CHECKSUM"
          LATEST_CHECKSUM_PATH="output/dakota-live-latest.iso-CHECKSUM"
          sha256sum "$ISO" | sed "s|${ISO}|${DATED}|" | tee "$CHECKSUM_PATH"
          sha256sum "$ISO" | sed "s|${ISO}|dakota-live-latest.iso|" > "$LATEST_CHECKSUM_PATH"
          echo "path=${CHECKSUM_PATH}" >> "$GITHUB_OUTPUT"
          echo "latest_path=${LATEST_CHECKSUM_PATH}" >> "$GITHUB_OUTPUT"

      - name: Upload ISO to Cloudflare R2
        if: ${{ inputs.skip_upload != true && github.event_name != 'pull_request' }}
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.RCLONE_CONFIG_R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.RCLONE_CONFIG_R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.RCLONE_CONFIG_R2_ENDPOINT }}
        run: |
          sudo apt-get install -y rclone -qq
          ISO="${{ steps.iso.outputs.path }}"
          DATED="${{ steps.iso.outputs.dated }}"
          rclone copyto --log-level INFO --checksum --s3-no-check-bucket \
            "$ISO" "R2:testing/${DATED}"
          rclone copyto --log-level INFO --s3-no-check-bucket \
            "$ISO" "R2:testing/dakota-live-latest.iso"
          rclone copyto --log-level INFO --s3-no-check-bucket \
            "${{ steps.checksum.outputs.path }}" "R2:testing/${DATED}-CHECKSUM"
          rclone copyto --log-level INFO --s3-no-check-bucket \
            "${{ steps.checksum.outputs.latest_path }}" \
            "R2:testing/dakota-live-latest.iso-CHECKSUM"

      - name: Boot verification (UEFI + serial)
        timeout-minutes: 10
        run: |
          sudo apt-get install -y qemu-system-x86 ovmf socat imagemagick -qq

          ISO="${{ steps.iso.outputs.path }}"
          EFI_CODE=""; EFI_VARS=""
          for f in /usr/share/OVMF/OVMF_CODE_4M.fd /usr/share/OVMF/OVMF_CODE.fd; do
            [ -f "$f" ] && EFI_CODE="$f" && break
          done
          for f in /usr/share/OVMF/OVMF_VARS_4M.fd /usr/share/OVMF/OVMF_VARS.fd; do
            if [ -f "$f" ]; then cp "$f" /tmp/EFI_VARS.fd; EFI_VARS="/tmp/EFI_VARS.fd"; break; fi
          done

          PFLASH=()
          if [ -n "$EFI_CODE" ] && [ -n "$EFI_VARS" ]; then
            PFLASH+=(-drive "if=pflash,format=raw,readonly=on,file=$EFI_CODE")
            PFLASH+=(-drive "if=pflash,format=raw,file=$EFI_VARS")
          fi

          sudo qemu-system-x86_64 \
            -machine type=q35,accel=kvm \
            -cpu host -m 4G -smp 2 \
            "${PFLASH[@]}" \
            -cdrom "$ISO" -boot d \
            -monitor unix:/tmp/qemu-monitor.sock,server,nowait \
            -serial file:/tmp/serial.log \
            -display none -daemonize

          for i in $(seq 1 30); do [ -S /tmp/qemu-monitor.sock ] && break; sleep 2; done

          echo "==> Waiting up to 5 minutes for DAKOTA_LIVE_READY..."
          for i in $(seq 1 60); do
            sudo grep -q "DAKOTA_LIVE_READY" /tmp/serial.log 2>/dev/null && \
              { echo "==> Ready after $((i*5))s"; break; }
            [ "$i" -eq 60 ] && echo "WARNING: timed out" || true
            sleep 5
          done

          echo "screendump /tmp/screenshot.ppm" | \
            sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock || true
          sleep 2
          sudo test -f /tmp/screenshot.ppm && \
            sudo convert /tmp/screenshot.ppm screenshot.png 2>/dev/null || true
          echo "quit" | sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock || true

          sudo grep -qE "DAKOTA_LIVE_READY|Finished live-ready\.service" /tmp/serial.log || \
            { echo "ERROR: live environment did not reach ready state"
              sudo tail -50 /tmp/serial.log; exit 1; }

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.iso.outputs.dated }}
          path: ${{ steps.iso.outputs.path }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        if: steps.checksum.outputs.path != ''
        with:
          name: checksum-${{ steps.iso.outputs.dated }}
          path: ${{ steps.checksum.outputs.path }}
          if-no-files-found: warn
          retention-days: 7

      - name: Upload boot screenshot
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: boot-screenshot
          path: screenshot.png
          if-no-files-found: warn
