name: Build and Publish Bluefin Live ISOs

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 5 1 * *'   # 1st of month, 05:00 UTC (after dakota at 03:00)
  workflow_dispatch:
    inputs:
      variant:
        description: 'Which variant to build (bluefin, bluefin-lts-hwe, stable, lts, or all)'
        required: false
        default: all
        type: string
      skip_upload:
        description: 'Build ISO but skip uploading to R2 (dry run)'
        required: false
        default: false
        type: boolean

jobs:
  build-and-publish:
    name: Build ${{ matrix.variant }} Live ISO
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      contents: read
      packages: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: bluefin
            payload_image: ghcr.io/projectbluefin/bluefin-nvidia:stable
            live_target: bluefin-nvidia
            registry: projectbluefin
            tag: stable
            iso_name: bluefin-live
          - variant: bluefin-lts-hwe
            payload_image: ghcr.io/projectbluefin/bluefin-lts-hwe-nvidia:stable
            live_target: bluefin-lts-hwe-nvidia
            registry: projectbluefin
            tag: stable
            iso_name: bluefin-lts-hwe-live
          - variant: stable
            payload_image: ghcr.io/projectbluefin/bluefin-nvidia:stable
            live_target: bluefin-nvidia
            registry: projectbluefin
            tag: stable
            iso_name: stable-live
          - variant: lts
            payload_image: ghcr.io/projectbluefin/bluefin-lts-hwe-nvidia:stable
            live_target: bluefin-lts-hwe-nvidia
            registry: projectbluefin
            tag: stable
            iso_name: lts-live

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Skip if workflow_dispatch selected a specific variant that doesn't match
      - name: Check if this variant should build
        id: should_build
        run: |
          INPUT="${{ inputs.variant }}"
          if [[ -z "$INPUT" || "$INPUT" == "all" || "$INPUT" == "${{ matrix.variant }}" ]]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Free disk space
        if: steps.should_build.outputs.build == 'true'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true

      - name: Install dependencies
        if: steps.should_build.outputs.build == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y podman buildah skopeo \
            mtools xorriso squashfs-tools dosfstools isomd5sum

      - name: Log in to GHCR
        if: steps.should_build.outputs.build == 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull offline payload image
        if: steps.should_build.outputs.build == 'true'
        run: sudo podman pull ${{ matrix.payload_image }}

      - name: Build live container
        if: steps.should_build.outputs.build == 'true'
        run: |
          sudo podman build \
            --cap-add sys_admin --security-opt label=disable \
            --layers \
            --build-arg TARGET=${{ matrix.live_target }} \
            --build-arg TAG=${{ matrix.tag }} \
            --build-arg REGISTRY=${{ matrix.registry }} \
            --build-arg INSTALLER_CHANNEL=stable \
            -t localhost/${{ matrix.live_target }}-live:latest \
            ./live

      - name: Build live squashfs + boot tar
        if: steps.should_build.outputs.build == 'true'
        env:
          SUPERISO_COMPRESSION: release
          SUPERISO_TMPDIR: /var/iso-build
        run: |
          sudo mkdir -p /var/iso-build
          sudo -E bash scripts/build-live-squashfs.sh \
            --oci-image ${{ matrix.payload_image }} \
            localhost/${{ matrix.live_target }}-live:latest \
            /var/iso-build/${{ matrix.live_target }}.rootfs.sfs \
            /var/iso-build/${{ matrix.live_target }}-boot.tar

      - name: Verify offline OCI store is embedded
        if: steps.should_build.outputs.build == 'true'
        run: |
          # bluefin/lts-hwe use composeFsBackend=false; build-live-squashfs.sh embeds the
          # OCI store as an overlay store at usr/lib/containers/storage.
          if ! sudo unsquashfs -lc /var/iso-build/${{ matrix.live_target }}.rootfs.sfs \
              usr/lib/containers/storage 2>/dev/null | grep -q "squashfs-root"; then
            echo "ERROR: Overlay store missing — OCI embedding failed" >&2
            exit 1
          fi
          echo ">>> OCI store assertion passed (overlay store present)"

      - name: Assemble ISO
        if: steps.should_build.outputs.build == 'true'
        run: |
          sudo bash live/src/build-iso.sh \
            /var/iso-build/${{ matrix.live_target }}-boot.tar \
            /var/iso-build/${{ matrix.live_target }}.rootfs.sfs \
            /var/iso-build/${{ matrix.iso_name }}.iso
          mkdir -p output
          sudo cp /var/iso-build/${{ matrix.iso_name }}.iso output/
          sudo chown -R "$USER:$(id -gn)" output/

      - name: Compute ISO name
        id: iso
        if: steps.should_build.outputs.build == 'true'
        run: |
          DATE=$(date -u +%Y%m%d)
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "dated=${{ matrix.iso_name }}-${DATE}-${SHA}.iso" >> "$GITHUB_OUTPUT"
          echo "path=output/${{ matrix.iso_name }}.iso" >> "$GITHUB_OUTPUT"

      - name: Generate SHA256 checksum
        id: checksum
        if: steps.should_build.outputs.build == 'true'
        run: |
          ISO="${{ steps.iso.outputs.path }}"
          DATED="${{ steps.iso.outputs.dated }}"
          CHECKSUM_PATH="output/${DATED}-CHECKSUM"
          LATEST_CHECKSUM_PATH="output/${{ matrix.iso_name }}-latest.iso-CHECKSUM"
          sha256sum "$ISO" | sed "s|${ISO}|${DATED}|" | tee "$CHECKSUM_PATH"
          sha256sum "$ISO" | sed "s|${ISO}|${{ matrix.iso_name }}-latest.iso|" > "$LATEST_CHECKSUM_PATH"
          echo "path=${CHECKSUM_PATH}" >> "$GITHUB_OUTPUT"
          echo "latest_path=${LATEST_CHECKSUM_PATH}" >> "$GITHUB_OUTPUT"

      - name: Upload ISO artifact
        if: steps.should_build.outputs.build == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.iso.outputs.dated }}
          path: |
            ${{ steps.iso.outputs.path }}
            ${{ steps.checksum.outputs.path }}
          retention-days: 7

      - name: Boot verification (UEFI + serial)
        id: boot_verify
        if: steps.should_build.outputs.build == 'true'
        continue-on-error: true
        timeout-minutes: 10
        run: |
          sudo apt-get install -y qemu-system-x86 ovmf socat imagemagick -qq

          ISO="${{ steps.iso.outputs.path }}"
          EFI_CODE=""; EFI_VARS=""
          for f in /usr/share/OVMF/OVMF_CODE_4M.fd /usr/share/OVMF/OVMF_CODE.fd; do
            [ -f "$f" ] && EFI_CODE="$f" && break
          done
          for f in /usr/share/OVMF/OVMF_VARS_4M.fd /usr/share/OVMF/OVMF_VARS.fd; do
            if [ -f "$f" ]; then cp "$f" /tmp/EFI_VARS.fd; EFI_VARS="/tmp/EFI_VARS.fd"; break; fi
          done

          PFLASH=()
          if [ -n "$EFI_CODE" ] && [ -n "$EFI_VARS" ]; then
            PFLASH+=(-drive "if=pflash,format=raw,readonly=on,file=$EFI_CODE")
            PFLASH+=(-drive "if=pflash,format=raw,file=$EFI_VARS")
          fi

          sudo qemu-system-x86_64 \
            -machine type=q35,accel=kvm \
            -cpu host -m 4G -smp 2 \
            "${PFLASH[@]}" \
            -cdrom "$ISO" -boot d \
            -monitor unix:/tmp/qemu-monitor.sock,server,nowait \
            -serial file:/tmp/serial.log \
            -display none -daemonize

          for i in $(seq 1 30); do [ -S /tmp/qemu-monitor.sock ] && break; sleep 2; done

          echo "==> Waiting up to 5 minutes for BLUEFIN_LIVE_READY..."
          for i in $(seq 1 60); do
            sudo grep -qE "BLUEFIN_LIVE_READY|DAKOTA_LIVE_READY|Finished live-ready\.service" \
              /tmp/serial.log 2>/dev/null && \
              { echo "==> Ready after $((i*5))s"; break; }
            [ "$i" -eq 60 ] && echo "WARNING: timed out" || true
            sleep 5
          done

          echo "screendump /tmp/screenshot.ppm" | \
            sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock || true
          sleep 2
          sudo test -f /tmp/screenshot.ppm && \
            sudo convert /tmp/screenshot.ppm screenshot.png 2>/dev/null || true
          echo "quit" | sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock || true

          sudo grep -qE "BLUEFIN_LIVE_READY|DAKOTA_LIVE_READY|Finished live-ready\.service" \
            /tmp/serial.log || \
            { echo "ERROR: live environment did not reach ready state"
              sudo tail -50 /tmp/serial.log; exit 1; }

      - name: Upload ISO to Cloudflare R2
        if: >
          steps.should_build.outputs.build == 'true' &&
          inputs.skip_upload != true &&
          github.event_name != 'pull_request' &&
          steps.boot_verify.outcome == 'success'
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.RCLONE_CONFIG_R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.RCLONE_CONFIG_R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.RCLONE_CONFIG_R2_ENDPOINT }}
        run: |
          sudo apt-get install -y rclone -qq
          ISO="${{ steps.iso.outputs.path }}"
          DATED="${{ steps.iso.outputs.dated }}"
          LATEST="${{ matrix.iso_name }}-latest.iso"
          LATEST_CHECKSUM="${{ matrix.iso_name }}-latest.iso-CHECKSUM"

          # Upload dated ISO + checksum
          rclone copyto --log-level INFO --s3-no-check-bucket "$ISO" "R2:testing/${DATED}"
          rclone copyto --log-level INFO --s3-no-check-bucket "${{ steps.checksum.outputs.path }}" "R2:testing/${DATED}-CHECKSUM"

          # Update latest pointers (server-side copy)
          rclone copyto --log-level INFO --s3-no-check-bucket "R2:testing/${DATED}" "R2:testing/${LATEST}"
          rclone copyto --log-level INFO --s3-no-check-bucket "R2:testing/${DATED}-CHECKSUM" "R2:testing/${LATEST_CHECKSUM}"
          echo "Published: ${DATED} → ${LATEST}"

      - name: Boot verification status
        if: always() && steps.boot_verify.outcome == 'failure'
        run: |
          echo "::error::Bluefin ISO failed the UEFI smoke boot — upload was skipped"
          exit 1
