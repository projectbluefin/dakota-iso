---
# Test a plain (unencrypted) composefs+systemd-boot installation via fisherman
# and verify the installed system boots to the graphical target.
#
# This is the primary regression guard for installer crashes.  Running with
# qemu-mem=4096 (4 GiB) keeps the dracut overlay tmpfs tight (~2 GiB), which
# reliably reproduces ENOSPC-class bugs (e.g. containers/storage writing blobs
# to /var/tmp instead of the disk-backed scratch dir).
#
# Runs two parallel legs:
#   dev    — continuous-dev Flatpak (catches regressions before stable)
#   stable — continuous Flatpak    (verifies what users actually download)
#
# Reported crash this test guards against:
#   https://github.com/ublue-os/bluefin/discussions/4754

name: Plain Install E2E

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      installer_channel:
        description: 'Installer channel to test (dev or stable)'
        required: false
        default: ''
  schedule:
    # Run weekly on Tuesday 04:00 UTC (staggered from the LUKS test on Monday)
    - cron: '0 4 * * 2'

permissions:
  issues: write
  pull-requests: write
  contents: write
  actions: read

jobs:
  unit-tests:
    name: Python Unit Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: taiki-e/install-action@e49978b799e49ff429d162b7a30601a569ab6538 # v2.81.1 (just)
        with:
          tool: just
      - run: pip install pytest
      - run: just test

  plain-e2e:
    needs: unit-tests
    name: Plain E2E ${{ matrix.variant }} (${{ matrix.installer_channel }})
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        variant: [dakota, stable, lts]
        installer_channel: [dev, stable]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Ensure ci-screenshots branch exists
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if gh api "/repos/${REPO}/git/refs/heads/ci-screenshots" &>/dev/null; then
            echo "ci-screenshots branch already exists"
          else
            echo "Creating ci-screenshots branch..."
            DEFAULT=$(gh api "/repos/${REPO}" --jq '.default_branch')
            SHA=$(gh api "/repos/${REPO}/git/refs/heads/${DEFAULT}" --jq '.object.sha')
            gh api --method POST "/repos/${REPO}/git/refs" \
              -f "ref=refs/heads/ci-screenshots" \
              -f "sha=${SHA}"
            echo "ci-screenshots branch created from ${DEFAULT}"
          fi

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 ovmf sshpass socat imagemagick \
            libguestfs-tools just

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo adduser "$USER" kvm || true

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Configure podman storage (intelligent driver selection)
        run: bash .github/scripts/configure_podman_storage.sh

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Clone patched fisherman
        run: |
          git clone https://github.com/projectbluefin/fisherman.git \
            --branch fix/overlay-driver-for-ostree-bootc-install \
            --depth 1 \
            /tmp/fisherman

      - name: Build ISO
        id: build
        env:
          INSTALLER_CHANNEL: ${{ matrix.installer_channel }}
        run: |
          START=$SECONDS
          sudo apt-get install -y --no-install-recommends \
            podman skopeo squashfs-tools xorriso dosfstools mtools buildah
          sudo mkdir -p /var/iso-build
          mkdir -p output
          # Pull the payload image so fisherman uses local containers-storage
          # instead of pulling ~10 GB from the network during the E2E test.
          PAYLOAD_IMAGE=$(cat ${{ matrix.variant }}/payload_ref | tr -d '[:space:]')
          sudo podman pull "$PAYLOAD_IMAGE"
          sudo -E bash scripts/build-live-squashfs.sh \
            --target ${{ matrix.variant }} \
            --installer-channel "$INSTALLER_CHANNEL" \
            --debug 1 \
            --oci-image "$PAYLOAD_IMAGE" \
            --output-dir /var/iso-build
          sudo bash scripts/build-iso.sh \
            --squashfs /var/iso-build/${{ matrix.variant }}-live.squashfs \
            --boot-tar /var/iso-build/${{ matrix.variant }}-boot-files.tar \
            --output /var/iso-build/${{ matrix.variant }}-live.iso
          sudo cp /var/iso-build/${{ matrix.variant }}-live.iso output/
          # The E2E test runs as the unprivileged user; make the ISO user-owned.
          sudo chown -R "$USER:$(id -gn)" output/
          ISO_SIZE=$(stat -c%s output/${{ matrix.variant }}-live.iso 2>/dev/null || echo 0)
          echo "iso_size=$ISO_SIZE" >> "$GITHUB_OUTPUT"
          echo "duration=$((SECONDS - START))" >> "$GITHUB_OUTPUT"
          echo "Built ISO: $(numfmt --to=iec "$ISO_SIZE")"

      - name: Run plain install E2E
        id: plain_test
        timeout-minutes: 60
        env:
          INSTALLER_CHANNEL: ${{ matrix.installer_channel }}
          FISHER_REPO: /tmp/fisherman/fisherman
        run: |
          START=$SECONDS
          # 4096 MiB: tight overlay tmpfs to expose ENOSPC-class bugs
          # Run as the unprivileged runner user (not sudo): the bootcDirect path
          # builds the patched fisherman with `go build`, which needs Go on PATH
          # and runs VCS stamping against the user-owned /tmp/fisherman clone — both
          # break under sudo. QEMU/KVM access uses an internal sudo fallback in the
          # recipe, and all guest-side install steps run via ssh with guest sudo.
          just qemu-mem=4096 installer_channel="$INSTALLER_CHANNEL" plain-test-qemu ${{ matrix.variant }}
          echo "duration=$((SECONDS - START))" >> "$GITHUB_OUTPUT"

      - name: Convert and publish screenshots
        if: always()
        continue-on-error: true
        id: screenshots
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          sudo chmod a+r /tmp/dakota-plain-qemu-*.log /tmp/plain-screenshot-final.ppm 2>/dev/null || true

          commit_png() {
            local src_ppm="$1" label="$2" out_var="$3"
            local png="/tmp/${label}.png"

            convert "$src_ppm" "$png" 2>/dev/null || return 0
            [[ -f "$png" ]] || return 0

            local path_in_repo="plain-e2e/${RUN_ID}/${{ matrix.variant }}/${{ matrix.installer_channel }}/${label}.png"
            local existing_sha
            existing_sha=$(gh api "/repos/${REPO}/contents/${path_in_repo}?ref=ci-screenshots" \
              --jq '.sha' 2>/dev/null || echo "")

            local b64_file
            b64_file=$(mktemp)
            base64 -w0 "$png" > "$b64_file"

            jq -n \
              --arg msg "Plain E2E screenshot: ${label} (run ${RUN_ID})" \
              --rawfile content "$b64_file" \
              --arg branch "ci-screenshots" \
              --arg sha "$existing_sha" \
              'if $sha != "" then
                {message: $msg, content: ($content | rtrimstr("\n")), branch: $branch, sha: $sha}
              else
                {message: $msg, content: ($content | rtrimstr("\n")), branch: $branch}
              end' | \
              gh api --method PUT "/repos/${REPO}/contents/${path_in_repo}" --input - > /dev/null

            rm "$b64_file"
            local url="https://raw.githubusercontent.com/${REPO}/ci-screenshots/${path_in_repo}"
            echo "${out_var}=${url}" >> "$GITHUB_OUTPUT"
            echo "Published ${label} → ${url}"
          }

          commit_png /tmp/plain-screenshot-final.ppm     "final-boot"    "final_url"

      - name: Upload serial logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plain-e2e-serial-logs-${{ matrix.variant }}-${{ matrix.installer_channel }}
          path: |
            /tmp/dakota-plain-qemu-live-serial.log
            /tmp/dakota-plain-qemu-installed-serial.log
            /tmp/plain-screenshot-final.png
          if-no-files-found: warn
          retention-days: 14

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          VARIANT:           ${{ matrix.variant }}
          TEST_RESULT:       ${{ steps.plain_test.outcome }}
          INSTALLER_CHANNEL: ${{ matrix.installer_channel }}
          FINAL_URL:         ${{ steps.screenshots.outputs.final_url }}
          BUILD_S:           ${{ steps.build.outputs.duration }}
          PLAIN_S:           ${{ steps.plain_test.outputs.duration }}
          ISO_BYTES:         ${{ steps.build.outputs.iso_size }}
        with:
          script: |
            const variant = process.env.VARIANT || 'dakota';
            const result  = process.env.TEST_RESULT || 'unknown';
            const channel = process.env.INSTALLER_CHANNEL || 'unknown';
            const pass    = result === 'success';
            const icon    = pass ? '✅' : '❌';
            const runUrl  = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const fmtDur  = s => s ? `${Math.floor(s/60)}m ${s%60}s` : 'N/A';
            const fmtMiB  = b => b ? `${(b/1024/1024).toFixed(0)} MiB` : 'N/A';
            const img     = (url, alt) => url ? `**${alt}**\n![${alt}](${url})\n` : '';
            const body = [
              `## ${icon} Plain Install E2E ${variant} (${channel}) — ${pass ? 'PASSED' : 'FAILED'}`,
              '',
              '| Step | Details |',
              '|------|---------|',
              `| ISO build    | ${fmtMiB(process.env.ISO_BYTES)} · ${fmtDur(process.env.BUILD_S)} |`,
              `| Plain E2E    | ${fmtDur(process.env.PLAIN_S)} |`,
              `| QEMU RAM     | 4096 MiB (tight overlay tmpfs) |`,
              `| Result       | ${icon} ${result} |`,
              '',
              img(process.env.FINAL_URL, 'Installed system boot'),
              `<sub>[Workflow run](${runUrl})</sub>`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

      - name: Write job summary
        if: always()
        run: |
          RESULT="${{ steps.plain_test.outcome }}"
          CHANNEL="${{ matrix.installer_channel }}"
          VARIANT="${{ matrix.variant }}"
          ICON=$( [ "$RESULT" = "success" ] && echo "✅" || echo "❌" )
          {
            echo "## ${ICON} Plain Install E2E ${VARIANT} (${CHANNEL}) — ${RESULT}"
            echo ""
            echo "| Step | Value |"
            echo "|------|-------|"
            echo "| ISO size     | $(numfmt --to=iec ${{ steps.build.outputs.iso_size }} 2>/dev/null || echo N/A) |"
            echo "| Build time   | ${{ steps.build.outputs.duration }}s |"
            echo "| Plain E2E    | ${{ steps.plain_test.outputs.duration }}s |"
            echo "| QEMU RAM     | 4096 MiB |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if plain test failed
        if: steps.plain_test.outcome == 'failure'
        run: |
          echo "::error::Plain install E2E failed — see serial logs above"
          echo "::error::Serial log tail:"
          ls /tmp/dakota-plain-qemu-*.log /tmp/plain-screenshot-final.png 2>/dev/null || true
          tail -30 /tmp/dakota-plain-qemu-installed-serial.log 2>/dev/null || true
          exit 1
