name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: '.'
          ignore_paths: >
            .git

  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Actionlint
        uses: rhysd/actionlint-action@v1

  ruff:
    name: Ruff (Linter and Formatter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Ruff Linter
        uses: astral-sh/ruff-action@v3
        with:
          args: 'check'
      - name: Run Ruff Formatter
        uses: astral-sh/ruff-action@v3
        with:
          args: 'format --check'
