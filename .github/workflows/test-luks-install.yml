name: LUKS Install End-to-End Test

# Test a full LUKS-encrypted installation via fisherman and verify the
# installed system can unlock and boot.  Mirrors the local just recipes:
#
#   just debug=1 installer_channel=dev iso-sd-boot dakota
#   just luks-test-qemu dakota
#
# Reproduces: projectbluefin/dakota#270

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Run weekly on Monday 04:00 UTC
    - cron: '0 4 * * 1'

permissions:
  issues: write
  pull-requests: write
  contents: write
  actions: read

jobs:
  luks-e2e:
    name: LUKS End-to-End Install
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure screenshots branch exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if gh api "/repos/${REPO}/git/refs/heads/ci-screenshots" &>/dev/null; then
            echo "ci-screenshots branch already exists"
            exit 0
          fi
          echo "Creating orphan ci-screenshots branch..."
          TREE_SHA=$(printf '{"tree":[{"path":"README.md","mode":"100644","type":"blob","content":"# CI Screenshots\n\nScreenshots committed here by CI so they can be embedded in PR comments via raw.githubusercontent.com.\n"}]}' | \
            gh api --method POST "/repos/${REPO}/git/trees" --input - --jq '.sha')
          COMMIT_SHA=$(gh api --method POST "/repos/${REPO}/git/commits" \
            -f "message=Initialize ci-screenshots branch" \
            -f "tree=${TREE_SHA}" --jq '.sha')
          gh api --method POST "/repos/${REPO}/git/refs" \
            -f "ref=refs/heads/ci-screenshots" \
            -f "sha=${COMMIT_SHA}"
          echo "ci-screenshots branch created"

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true

      - name: Mount BTRFS for podman storage
        env:
          BTRFS_LOOPBACK_FREE: "0.95"
        run: bash .github/scripts/mount_btrfs.sh

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            just podman mtools xorriso \
            qemu-system-x86 ovmf socat sshpass \
            imagemagick -qq

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build debug ISO
        id: build
        run: |
          START=$(date +%s)
          sudo just debug=1 installer_channel=dev output_dir=output iso-sd-boot dakota
          echo "duration=$(( $(date +%s) - START ))" >> "$GITHUB_OUTPUT"
          ISO=$(ls output/*.iso output/bootiso/install.iso output/bootc-*.iso 2>/dev/null | head -1)
          echo "iso_size=$(stat -c%s "$ISO" 2>/dev/null || echo 0)" >> "$GITHUB_OUTPUT"

      - name: Fix output directory ownership
        run: sudo chown -R "$USER:$(id -gn)" output/

      - name: Run LUKS end-to-end test
        id: luks_test
        run: |
          START=$(date +%s)
          just luks-test-qemu dakota
          echo "duration=$(( $(date +%s) - START ))" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Convert and publish screenshots
        if: always()
        id: screenshots
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          # Make root-owned PPMs readable
          sudo chmod a+r /tmp/luks-screenshot-*.ppm /tmp/luks-unlock-snap.ppm 2>/dev/null || true

          commit_png() {
            local src_ppm="$1" label="$2" out_var="$3"
            local png="/tmp/${label}.png"

            convert "$src_ppm" "$png" 2>/dev/null || return 0
            [[ -f "$png" ]] || return 0

            local path_in_repo="luks-e2e/${RUN_ID}/${label}.png"
            local existing_sha
            existing_sha=$(gh api "/repos/${REPO}/contents/${path_in_repo}?ref=ci-screenshots" \
              --jq '.sha' 2>/dev/null || echo "")

            local b64_file
            b64_file=$(mktemp)
            base64 -w0 "$png" > "$b64_file"

            jq -n \
              --arg msg "LUKS E2E screenshot: ${label} (run ${RUN_ID})" \
              --rawfile content "$b64_file" \
              --arg branch "ci-screenshots" \
              --arg sha "$existing_sha" \
              'if $sha != "" then
                {message: $msg, content: ($content | rtrimstr("\n")), branch: $branch, sha: $sha}
              else
                {message: $msg, content: ($content | rtrimstr("\n")), branch: $branch}
              end' | \
              gh api --method PUT "/repos/${REPO}/contents/${path_in_repo}" --input - > /dev/null

            rm "$b64_file"
            local url="https://raw.githubusercontent.com/${REPO}/ci-screenshots/${path_in_repo}"
            echo "${out_var}=${url}" >> "$GITHUB_OUTPUT"
            echo "Published ${label} → ${url}"
          }

          commit_png /tmp/luks-screenshot-live.ppm      "live-boot"     "live_url"
          commit_png /tmp/luks-screenshot-plymouth.ppm  "plymouth"      "plymouth_url"
          commit_png /tmp/luks-screenshot-final.ppm     "final-boot"    "final_url"

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          LIVE_URL:     ${{ steps.screenshots.outputs.live_url }}
          PLYMOUTH_URL: ${{ steps.screenshots.outputs.plymouth_url }}
          FINAL_URL:    ${{ steps.screenshots.outputs.final_url }}
          BUILD_S:      ${{ steps.build.outputs.duration }}
          LUKS_S:       ${{ steps.luks_test.outputs.duration }}
          ISO_BYTES:    ${{ steps.build.outputs.iso_size }}
          TEST_RESULT:  ${{ steps.luks_test.outcome }}
        with:
          script: |
            const result  = process.env.TEST_RESULT || 'unknown';
            const pass    = result === 'success';
            const icon    = pass ? '✅' : '❌';
            const runUrl  = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const fmtDur = s => s ? `${Math.floor(s/60)}m ${s%60}s` : 'N/A';
            const fmtMiB = b => b ? `${(b/1024/1024).toFixed(0)} MiB` : 'N/A';

            const img = (url, alt) => url ? `**${alt}**\n![${alt}](${url})\n` : '';

            const body = [
              `## ${icon} LUKS End-to-End Test — ${pass ? 'PASSED' : 'FAILED'}`,
              '',
              '| Step | Details |',
              '|------|---------|',
              `| ISO build | ${fmtMiB(process.env.ISO_BYTES)} · ${fmtDur(process.env.BUILD_S)} |`,
              `| LUKS E2E  | ${fmtDur(process.env.LUKS_S)} |`,
              `| Result    | ${icon} ${result} |`,
              '',
              img(process.env.LIVE_URL,     'Live boot'),
              img(process.env.PLYMOUTH_URL, 'Plymouth passphrase prompt'),
              img(process.env.FINAL_URL,    'Installed system (post-LUKS unlock)'),
              `<sub>[Workflow run](${runUrl})</sub>`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

      - name: Write job summary
        if: always()
        run: |
          RESULT="${{ steps.luks_test.outcome }}"
          ICON=$( [ "$RESULT" = "success" ] && echo "✅" || echo "❌" )
          {
            echo "## ${ICON} LUKS End-to-End Test — ${RESULT}"
            echo ""
            echo "| Step | Value |"
            echo "|------|-------|"
            echo "| ISO size | $(numfmt --to=iec ${{ steps.build.outputs.iso_size }} 2>/dev/null || echo N/A) |"
            echo "| Build time | ${{ steps.build.outputs.duration }}s |"
            echo "| LUKS test time | ${{ steps.luks_test.outputs.duration }}s |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload serial logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: luks-e2e-serial-logs
          path: |
            /tmp/dakota-qemu-live-serial.log
            /tmp/dakota-qemu-installed-serial.log
          if-no-files-found: warn
          retention-days: 14
